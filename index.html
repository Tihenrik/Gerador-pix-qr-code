<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Pix v9 (Com Banco)</title>
    <!-- Carrega o Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carrega a biblioteca para gerar QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <style>
        /* Fonte Inter */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }
        
        /* Custom scrbollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
        
        <!-- NAVEGAÇÃO EM ABAS -->
        <div class="flex p-3 gap-2 bg-gray-100 border-b border-gray-200">
            <button id="btn-nav-gerar" class="w-1/3 py-2.5 px-2 text-center transition flex items-center justify-center rounded-lg bg-blue-600 text-white font-semibold shadow-md">
                Gerar
            </button>
            <button id="btn-nav-recebedores" class="w-1/3 py-2.5 px-2 text-center transition flex items-center justify-center rounded-lg text-blue-600 font-medium hover:bg-blue-50">
                Chaves pix
            </button>
            <button id="btn-nav-historico" class="w-1/3 py-2.5 px-2 text-center transition flex items-center justify-center rounded-lg text-blue-600 font-medium hover:bg-blue-50">
                Histórico
            </button>
        </div>

        <!-- CONTEÚDO DAS PÁGINAS -->
        <div class="p-6 md:p-8 h-[65vh] overflow-y-auto custom-scrollbar">

            <!-- ======================= -->
            <!--   PÁGINA 1: GERAR PIX   -->
            <!-- ======================= -->
            <div id="page-gerar">
                <div class="space-y-6">
                    <h2 class="text-xl font-semibold text-gray-800 text-center">Nova Cobrança</h2>
                    
                    <!-- Dropdown Customizado para "Recebedor" -->
                    <div>
                        <label for="receiver-select-button" class="block text-sm font-medium text-gray-700 mb-1">
                            Recebedor
                        </label>
                        
                        <!-- Container do Dropdown Customizado -->
                        <div id="receiver-select-container" class="relative">
                            
                            <!-- Botão Principal (Gatilho) -->
                            <button type="button" id="receiver-select-button" 
                                    class="relative w-full cursor-pointer rounded-lg bg-white py-3 pl-4 pr-10 text-left border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    aria-haspopup="listbox" aria-expanded="false">
                                <!-- Placeholder/Valor Selecionado -->
                                <span id="receiver-select-value" class="block truncate text-gray-500">
                                    Selecione uma chave
                                </span>
                                <!-- Ícone da Seta (Chevron Up/Down) -->
                                <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2">
                                    <svg class="h-5 w-5 text-gray-400" id="receiver-select-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 011.06 0L10 11.94l3.72-3.72a.75.75 0 111.06 1.06l-4.25 4.25a.75.75 0 01-1.06 0L5.22 9.28a.75.75 0 010-1.06z" clip-rule="evenodd" />
                                    </svg>
                                </span>
                            </button>
                            
                            <!-- Painel de Opções (Escondido por padrão) -->
                            <div id="receiver-select-list" 
                                 class="absolute z-10 mt-1 max-h-48 w-full overflow-y-auto rounded-lg bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none hidden custom-scrollbar"
                                 tabindex="-1" role="listbox">
                                <!-- Opções serão preenchidas pelo JS -->
                            </div>
                        </div>
                    </div>

                    <!-- Campo Valor -->
                    <div>
                        <label for="pix-value" class="block text-sm font-medium text-gray-700 mb-1">
                            Valor
                        </label>
                        <input type="text" id="pix-value" inputmode="decimal"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm text-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                               placeholder="R$ 0,00">
                    </div>

                    <button id="generate-btn"
                            class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:bg-blue-700 transition duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 flex justify-center">
                        Gerar Pix
                    </button>
                    <div id="error-message-gerar" class="text-red-600 text-center hidden"></div>
                </div>
            </div>

            <!-- ============================== -->
            <!--   PÁGINA 2: RECEBEDORES      -->
            <!-- ============================== -->
            <div id="page-recebedores" class="hidden">
                <div class="space-y-6">
                    <h2 class="text-xl font-semibold text-gray-800 text-center">Minhas chaves</h2>

                    <!-- Botão para expandir formulário -->
                    <button id="show-add-form-btn" class="w-full bg-blue-100 text-blue-700 font-semibold py-3 px-4 rounded-lg shadow-sm hover:bg-blue-200 transition flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        Adicionar Nova Chave
                    </button>

                    <!-- Formulário de Adicionar/Editar (Recolhível) -->
                    <form id="receiver-form" class="space-y-4 p-4 border border-gray-200 rounded-lg shadow-sm hidden">
                        <h3 id="form-title" class="text-lg font-medium text-gray-700">Adicionar Nova</h3>
                        <input type="hidden" id="receiver-id"> <!-- Para edição -->
                        
                        <!-- CAMPO: Tipo de Chave -->
                        <div>
                            <label for="pix-key-type" class="block text-sm font-medium text-gray-700 mb-1">Tipo de Chave</label>
                            <select id="pix-key-type" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                                <option value="cpf">CPF</option>
                                <option value="cnpj">CNPJ</option>
                                <option value="celular">Celular</option>
                                <option value="email">E-mail</option>
                                <option value="aleatoria">Aleatória (EVP)</option>
                            </select>
                        </div>
                        
                        <div>
                            <label for="pix-key" class="block text-sm font-medium text-gray-700 mb-1">Chave Pix</label>
                            <input type="text" id="pix-key" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Digite a chave...">
                        </div>
                        <div>
                            <label for="pix-name" class="block text-sm font-medium text-gray-700 mb-1">Nome do Recebedor</label>
                            <input type="text" id="pix-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ex: Maria da Silva">
                        </div>
                        
                        <!-- NOVO CAMPO: BANCO -->
                        <div>
                            <label for="pix-bank" class="block text-sm font-medium text-gray-700 mb-1">Banco</label>
                            <input type="text" id="pix-bank" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ex: Nubank, Caixa, Santander.">
                        </div>
                        
                        <div>
                            <label for="pix-city" class="block text-sm font-medium text-gray-700 mb-1">Cidade</label>
                            <input type="text" id="pix-city" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ex: São paulo">
                        </div>
                        
                        <div class="flex gap-2">
                            <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded-lg shadow-lg hover:bg-green-700 transition">
                                Salvar
                            </button>
                            <button type="button" id="cancel-edit-btn" class="w-full bg-gray-500 text-white font-bold py-2 px-4 rounded-lg shadow-lg hover:bg-gray-600 transition">
                                Cancelar
                            </button>
                        </div>
                        <div id="success-message-config" class="text-green-600 text-center hidden"></div>
                    </form>

                    <!-- Lista de Recebedores (Scroll) -->
                    <div id="receiver-list-container" class="space-y-3 max-h-60 overflow-y-auto custom-scrollbar p-1">
                        <!-- Recebedores salvos serão inseridos aqui -->
                    </div>
                </div>
            </div>

            <!-- ============================== -->
            <!--   PÁGINA 3: HISTÓRICO        -->
            <!-- ============================== -->
            <div id="page-historico" class="hidden">
                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xl font-semibold text-gray-800">Histórico</h2>
                        <button id="clear-history-btn" class="text-sm text-red-600 hover:text-red-800 font-medium flex items-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            Limpar Tudo
                        </button>
                    </div>
                    <div id="history-list" class="space-y-3">
                        <!-- Histórico será inserido aqui -->
                    </div>
                </div>
            </div>

        </div> <!-- Fim do padding p-6 -->
    </div> <!-- Fim do card principal -->


    <!-- ======================= -->
    <!--   MODAL DE RESULTADO    -->
    <!-- ======================= -->
    <div id="result-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 relative">
            <!-- Botão de Fechar -->
            <button id="close-modal-btn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            
            <div class="flex flex-col items-center">
                
                <h3 id="modal-pix-value" class="text-3xl font-bold text-gray-900 mt-4 mb-2">R$ 0,00</h3>
                
                <!-- QR Code -->
                <div id="modal-qrcode-container" class="p-2 border border-gray-300 rounded-lg bg-white shadow-md">
                    <!-- Canvas do QR Code -->
                </div>
            </div>

            <!-- Pix Copia e Cola -->
            <div class="mt-6">
                <label for="modal-pix-brcode" class="block text-sm font-medium text-gray-700 mb-2">
                    Pix Copia e Cola
                </label>
                <div class="relative">
                    <textarea id="modal-pix-brcode" readonly rows="3"
                           class="w-full p-3 pr-16 bg-gray-100 border border-gray-300 rounded-lg text-gray-700 text-sm break-all focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                    <button id="modal-copy-btn"
                            class="absolute right-2 top-2 bg-blue-100 text-blue-700 px-3 py-1.5 rounded-md text-sm font-semibold hover:bg-blue-200 transition">
                        Copiar
                    </button>
                </div>
                <div id="modal-copy-feedback" class="text-green-600 text-center text-sm mt-2 hidden">
                    Copiado com sucesso!
                </div>
            </div>
        </div>
    </div>
    
    <!-- ============================= -->
    <!--   MODAL DE CONFIRMAÇÃO (NOVO) -->
    <!-- ============================= -->
    <div id="confirm-modal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-[60] hidden">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
            <h3 class="text-lg font-bold text-gray-900">Confirmar Exclusão</h3>
            <p id="confirm-modal-message" class="text-gray-600 mt-2 mb-6">Tem certeza que deseja excluir este item?</p>
            <div class="flex justify-end gap-3">
                <button id="confirm-modal-cancel-btn" class="bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg hover:bg-gray-300 transition">
                    Cancelar
                </button>
                <button id="confirm-modal-ok-btn" class="bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700 transition">
                    Excluir
                </button>
            </div>
        </div>
    </div>


    <script>
        // --- Chaves do localStorage ---
        const STORAGE_RECEIVERS = 'pixReceivers_v6'; // v6 para incluir o banco
        const STORAGE_HISTORY = 'pixHistory_v6';

        // --- Elementos do DOM ---
        const pages = {
            gerar: document.getElementById('page-gerar'),
            recebedores: document.getElementById('page-recebedores'),
            historico: document.getElementById('page-historico'),
        };
        const navButtons = {
            gerar: document.getElementById('btn-nav-gerar'),
            recebedores: document.getElementById('btn-nav-recebedores'),
            historico: document.getElementById('btn-nav-historico'),
        };

        // Page Gerar
        const pixValueInput = document.getElementById('pix-value');
        const generateBtn = document.getElementById('generate-btn');
        const errorGerar = document.getElementById('error-message-gerar');
        
        // Dropdown Customizado
        const receiverSelectContainer = document.getElementById('receiver-select-container');
        const receiverSelectButton = document.getElementById('receiver-select-button');
        const receiverSelectValue = document.getElementById('receiver-select-value');
        const receiverSelectList = document.getElementById('receiver-select-list');
        const receiverSelectChevron = document.getElementById('receiver-select-chevron');


        // Page Recebedores
        const showAddFormBtn = document.getElementById('show-add-form-btn');
        const receiverForm = document.getElementById('receiver-form');
        const formTitle = document.getElementById('form-title');
        const receiverIdInput = document.getElementById('receiver-id');
        const pixKeyTypeInput = document.getElementById('pix-key-type'); 
        const pixKeyInput = document.getElementById('pix-key');
        const pixNameInput = document.getElementById('pix-name');
        const pixBankInput = document.getElementById('pix-bank'); // NOVO
        const pixCityInput = document.getElementById('pix-city');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const successConfig = document.getElementById('success-message-config');
        const receiverListContainer = document.getElementById('receiver-list-container');

        // Page Histórico
        const historyList = document.getElementById('history-list');
        const clearHistoryBtn = document.getElementById('clear-history-btn');

        // Modal Resultado
        const resultModal = document.getElementById('result-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const modalQrcodeContainer = document.getElementById('modal-qrcode-container');
        const modalBrcodeTextarea = document.getElementById('modal-pix-brcode');
        const modalCopyBtn = document.getElementById('modal-copy-btn');
        const modalCopyFeedback = document.getElementById('modal-copy-feedback');
        const modalPixValue = document.getElementById('modal-pix-value'); 

        // Modal Confirmação
        const confirmModal = document.getElementById('confirm-modal');
        const confirmModalMessage = document.getElementById('confirm-modal-message');
        const confirmModalCancelBtn = document.getElementById('confirm-modal-cancel-btn');
        const confirmModalOkBtn = document.getElementById('confirm-modal-ok-btn');
        let confirmCallback = null; 

        // --- Estado da Aplicação ---
        let receivers = [];
        let history = [];
        let selectedReceiverId = null;

        // --- Lógica de Navegação ---
        
        function showPage(pageName) {
            const activeClasses = ['bg-blue-600', 'text-white', 'font-semibold', 'shadow-md'];
            const inactiveClasses = ['text-blue-600', 'font-medium', 'hover:bg-blue-50', 'bg-transparent']; 

            Object.values(pages).forEach(page => page.classList.add('hidden'));
            
            Object.values(navButtons).forEach(btn => {
                btn.classList.remove(...activeClasses);
                btn.classList.add(...inactiveClasses);
            });
            
            pages[pageName].classList.remove('hidden');
            
            navButtons[pageName].classList.remove(...inactiveClasses);
            navButtons[pageName].classList.add(...activeClasses);
            
            if (pageName !== 'gerar') {
                closeReceiverSelect();
            }
        }

        // --- Lógica de Formatação (Input Mask) ---
        pixValueInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value === '') value = '0';
            e.target.value = (parseInt(value, 10) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        });

        // --- Lógica do Modal de Confirmação ---
        function showConfirmModal(message, onConfirm) {
            confirmModalMessage.textContent = message;
            confirmCallback = onConfirm; 
            confirmModal.classList.remove('hidden');
        }

        function hideConfirmModal() {
            confirmModal.classList.add('hidden');
            confirmCallback = null;
        }

        confirmModalOkBtn.addEventListener('click', () => {
            if (typeof confirmCallback === 'function') {
                confirmCallback(); 
            }
            hideConfirmModal();
        });
        confirmModalCancelBtn.addEventListener('click', hideConfirmModal);


        // --- Funções de Renderização ---

        function getFriendlyKeyType(keyType) {
            switch (keyType) {
                case 'cpf': return 'CPF';
                case 'cnpj': return 'CNPJ';
                case 'celular': return 'Celular';
                case 'email': return 'E-mail';
                case 'aleatoria': return 'Aleatória';
                default: return 'Chave';
            }
        }

        // MODIFICADO: renderReceiverList (mostra banco)
        function renderReceiverList() {
            receiverListContainer.innerHTML = '';
            if (receivers.length === 0) {
                receiverListContainer.innerHTML = '<p class="text-gray-500 text-center">Nenhuma chave cadastrada.</p>';
                return;
            }
            receivers.forEach(r => {
                const item = document.createElement('div');
                item.className = 'bg-gray-50 p-4 rounded-lg shadow-sm flex justify-between items-center';
                
                const friendlyType = getFriendlyKeyType(r.keyType);
                
                item.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <p class="text-base font-medium text-gray-900 truncate">${r.name}</p>
                            <span class="flex-shrink-0 text-xs font-medium bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded">${friendlyType}</span>
                        </div>
                        <p class="text-sm text-gray-500 truncate">${r.key}</p>
                        <p class="text-sm text-gray-500 truncate">${r.bank || 'Banco não informado'}</p>
                    </div>
                    <div class="flex-shrink-0 flex gap-2 ml-4">
                        <button class="edit-receiver-btn text-blue-600 hover:text-blue-800" data-id="${r.id}" title="Editar">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002 2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        </button>
                        <button class="delete-receiver-btn text-red-600 hover:text-red-800" data-id="${r.id}" data-key="${r.key}" title="Excluir">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                `;
                receiverListContainer.appendChild(item);
            });
        }

        // MODIFICADO: updateReceiverSelectDisplay (mostra banco)
        function updateReceiverSelectDisplay() {
            receiverSelectList.querySelectorAll('.check-icon').forEach(icon => {
                icon.classList.add('hidden');
            });
            
            const selectedReceiver = receivers.find(r => r.id === selectedReceiverId);

            if (selectedReceiver) {
                receiverSelectValue.innerHTML = `
                    <span class="font-medium block truncate text-gray-900">${selectedReceiver.name}</span>
                    <span class="text-sm text-gray-500 block truncate">${selectedReceiver.key}</span>
                    <span class="text-sm text-gray-500 block truncate">${selectedReceiver.bank || 'Sem banco'}</span>
                `;
                receiverSelectValue.classList.remove('text-gray-500');
                
                const selectedOption = receiverSelectList.querySelector(`.receiver-select-option[data-id="${selectedReceiverId}"] .check-icon`);
                if (selectedOption) {
                    selectedOption.classList.remove('hidden');
                }
            } else {
                receiverSelectValue.textContent = 'Selecione uma chave';
                receiverSelectValue.classList.add('text-gray-500');
            }
        }
        
        // MODIFICADO: renderReceiverSelect (mostra banco)
        function renderReceiverSelect() {
            receiverSelectList.innerHTML = ''; 

            if (receivers.length === 0) {
                receiverSelectValue.textContent = 'Cadastre uma chave primeiro';
                receiverSelectValue.classList.add('text-gray-500');
                receiverSelectButton.disabled = true;
                selectedReceiverId = null;
                return;
            }
            
            receiverSelectButton.disabled = false;
            
            receivers.forEach(r => {
                const item = document.createElement('div');
                item.className = 'receiver-select-option cursor-pointer select-none relative py-2 pl-4 pr-10 text-gray-900 hover:bg-blue-100';
                item.setAttribute('role', 'option');
                item.dataset.id = r.id;
                
                const friendlyType = getFriendlyKeyType(r.keyType);

                item.innerHTML = `
                    <span class="font-medium block truncate">${r.name} (${friendlyType})</span>
                    <span class="text-sm text-gray-500 block truncate">${r.key}</span>
                    <span class="text-sm text-gray-500 block truncate">${r.bank || 'Sem banco'}</span>
                    
                    <span class="check-icon absolute inset-y-0 right-0 hidden items-center pr-3 text-blue-600">
                        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M16.704 5.296a.75.75 0 010 1.06l-7.5 7.5a.75.75 0 01-1.06 0l-3.5-3.5a.75.75 0 111.06-1.06L9 12.94l6.97-6.97a.75.75 0 011.06 0z" clip-rule="evenodd" />
                        </svg>
                    </span>
                `;
                receiverSelectList.appendChild(item);
            });
            
            const currentSelectionValid = receivers.some(r => r.id === selectedReceiverId);
            
            if (!currentSelectionValid) {
                selectedReceiverId = receivers[0]?.id || null;
            }
            
            updateReceiverSelectDisplay();
        }

        // MODIFICADO: renderHistoryList (mostra chave e banco)
        function renderHistoryList() {
            historyList.innerHTML = '';
            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-gray-500 text-center">Nenhuma cobrança gerada.</p>';
                return;
            }
            [...history].reverse().forEach(h => {
                const item = document.createElement('div');
                item.className = 'bg-gray-50 p-4 rounded-lg shadow-sm flex justify-between items-center';
                item.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <p class="text-base font-medium text-gray-900 truncate">${h.receiverName}</p>
                        <p class="text-sm text-gray-500 truncate">${h.receiverKey || 'Chave não registrada'}</p>
                        <p class="text-sm text-gray-500 truncate">${h.receiverBank || 'Banco não registrado'}</p>
                        <p class="text-lg font-bold text-blue-600 mt-1">${h.value}</p>
                        <p class="text-xs text-gray-500">${new Date(h.date).toLocaleString('pt-BR')}</p>
                    </div>
                    <div class="flex-shrink-0 flex gap-3 ml-4">
                        <button class="view-history-btn text-blue-600 hover:text-blue-800" data-id="${h.id}" title="Visualizar Pix">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </button>
                        <button class="delete-history-btn text-red-600 hover:text-red-800" data-id="${h.id}" title="Excluir">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        </button>
                    </div>
                `;
                historyList.appendChild(item);
            });
        }

        function renderAll() {
            renderReceiverList();
            renderReceiverSelect(); 
            renderHistoryList();
        }
        
        // --- Funções de Persistência (localStorage) ---
        
        // MODIFICADO: loadData (adiciona 'bank')
        function loadData() {
            // Migração de dados antigos: Adiciona 'keyType' e 'bank' se não existirem
            const loadedReceivers = JSON.parse(localStorage.getItem(STORAGE_RECEIVERS)) || [];
            receivers = loadedReceivers.map(r => {
                let keyType = r.keyType;
                if (!keyType) {
                    // Formato antigo, tentar adivinhar o tipo
                    keyType = 'aleatoria'; // Padrão
                    const keyOnlyNumbers = r.key.replace(/[^0-9]/g, '');

                    if (r.key.includes('@')) {
                        keyType = 'email';
                    } else if (keyOnlyNumbers.length === 11) {
                        keyType = 'cpf';
                    } else if (keyOnlyNumbers.length === 14) {
                        keyType = 'cnpj';
                    } else if (r.key.startsWith('+') || (keyOnlyNumbers.length >= 10 && keyOnlyNumbers.length <= 11)) {
                        keyType = 'celular';
                    }
                }
                
                return { ...r, key: r.key, keyType: keyType, bank: r.bank || '' };
            });
            
            history = JSON.parse(localStorage.getItem(STORAGE_HISTORY)) || [];
            
            if (!selectedReceiverId && receivers.length > 0) {
                selectedReceiverId = receivers[0].id;
            }
        }

        function saveReceivers() {
            localStorage.setItem(STORAGE_RECEIVERS, JSON.stringify(receivers));
            renderAll();
        }

        function saveHistory() {
            localStorage.setItem(STORAGE_HISTORY, JSON.stringify(history));
            renderAll();
        }

        // --- Lógica CRUD Recebedores ---
        
        function resetReceiverForm() {
            receiverForm.reset();
            receiverIdInput.value = '';
            pixKeyTypeInput.value = 'cpf'; // Reseta para o padrão
            formTitle.textContent = 'Adicionar Nova';
            successConfig.classList.add('hidden');
            receiverForm.classList.add('hidden'); 
            showAddFormBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg> Adicionar Nova Chave';
            showAddFormBtn.classList.remove('bg-red-100', 'text-red-700', 'hover:bg-red-200');
            showAddFormBtn.classList.add('bg-blue-100', 'text-blue-700', 'hover:bg-blue-200');
        }

        showAddFormBtn.addEventListener('click', () => {
            if (receiverForm.classList.contains('hidden')) {
                resetReceiverForm(); 
                receiverForm.classList.remove('hidden');
                showAddFormBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg> Fechar Formulário';
                showAddFormBtn.classList.remove('bg-blue-100', 'text-blue-700', 'hover:bg-blue-200');
                showAddFormBtn.classList.add('bg-red-100', 'text-red-700', 'hover:bg-red-200');
            } else {
                resetReceiverForm();
            }
        });
        
        // MODIFICADO: receiverForm submit (inclui 'bank')
        receiverForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const id = receiverIdInput.value;
            
            // Pega os novos valores
            const keyType = pixKeyTypeInput.value;
            const key = pixKeyInput.value.trim(); 
            const name = pixNameInput.value.trim();
            const bank = pixBankInput.value.trim(); // NOVO
            const city = pixCityInput.value.trim();

            if (!key || !name || !city || !bank) { // NOVO: valida banco
                successConfig.textContent = 'Preencha todos os campos.';
                successConfig.classList.remove('hidden', 'text-green-600');
                successConfig.classList.add('text-red-600'); 
                setTimeout(() => {
                    successConfig.classList.add('hidden');
                    successConfig.classList.remove('text-red-600');
                    successConfig.classList.add('text-green-600'); 
                }, 3000);
                return;
            };

            const isDuplicate = receivers.some(r => r.key === key && r.id !== id);
            if (isDuplicate) {
                successConfig.textContent = 'Esta chave Pix já está cadastrada.';
                successConfig.classList.remove('hidden', 'text-green-600');
                successConfig.classList.add('text-red-600'); 
                setTimeout(() => {
                    successConfig.classList.add('hidden');
                    successConfig.classList.remove('text-red-600');
                    successConfig.classList.add('text-green-600'); 
                }, 3000);
                return; 
            }

            if (id) {
                // Editar
                const index = receivers.findIndex(r => r.id === id);
                if (index > -1) receivers[index] = { id, key, keyType, name, city, bank }; // NOVO: bank
            } else {
                // Adicionar
                const newId = crypto.randomUUID();
                receivers.push({ id: newId, key, keyType, name, city, bank }); // NOVO: bank
                selectedReceiverId = newId;
            }
            
            saveReceivers();
            resetReceiverForm();
            
            successConfig.textContent = 'Chave salva com sucesso!';
            successConfig.classList.remove('hidden', 'text-red-600'); 
            successConfig.classList.add('text-green-600'); 
            setTimeout(() => successConfig.classList.add('hidden'), 2000);
        });

        // MODIFICADO: receiverListContainer click (preenche 'bank' na edição)
        receiverListContainer.addEventListener('click', (e) => {
            const editBtn = e.target.closest('.edit-receiver-btn');
            if (editBtn) {
                const id = editBtn.dataset.id;
                const receiver = receivers.find(r => r.id === id);
                if (receiver) {
                    receiverIdInput.value = receiver.id;
                    pixKeyTypeInput.value = receiver.keyType || 'cpf'; 
                    pixKeyInput.value = receiver.key;
                    pixNameInput.value = receiver.name;
                    pixBankInput.value = receiver.bank; // NOVO
                    pixCityInput.value = receiver.city;
                    formTitle.textContent = 'Editar Chave';
                    
                    receiverForm.classList.remove('hidden'); 
                    showAddFormBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg> Fechar Formulário';
                    showAddFormBtn.classList.remove('bg-blue-100', 'text-blue-700', 'hover:bg-blue-200');
                    showAddFormBtn.classList.add('bg-red-100', 'text-red-700', 'hover:bg-red-200');

                    receiverForm.scrollIntoView({ behavior: 'smooth' });
                }
            }
            
            const deleteBtn = e.target.closest('.delete-receiver-btn');
            if (deleteBtn) {
                const id = deleteBtn.dataset.id;
                const key = deleteBtn.dataset.key; 
                
                showConfirmModal(`Tem certeza que deseja apagar a chave "${key}"?`, () => {
                    receivers = receivers.filter(r => r.id !== id);
                    if (selectedReceiverId === id) {
                        selectedReceiverId = null;
                    }
                    saveReceivers();
                });
            }
        });

        cancelEditBtn.addEventListener('click', resetReceiverForm);

        // --- Lógica CRUD Histórico ---
        historyList.addEventListener('click', (e) => {
            const viewBtn = e.target.closest('.view-history-btn');
            if (viewBtn) {
                const id = viewBtn.dataset.id;
                const item = history.find(h => h.id === id);
                if (item) {
                    showResultModal(item.brcode, item.value); 
                }
            }
            
            const deleteBtn = e.target.closest('.delete-history-btn');
            if (deleteBtn) {
                const id = deleteBtn.dataset.id;
                showConfirmModal('Tem certeza que deseja excluir este item do histórico?', () => {
                    history = history.filter(h => h.id !== id);
                    saveHistory();
                });
            }
        });

        clearHistoryBtn.addEventListener('click', () => {
            if (history.length === 0) return;
            showConfirmModal('Tem certeza que deseja limpar TODO o histórico? Esta ação não pode ser desfeita.', () => {
                history = [];
                saveHistory();
            });
        });


        // --- Lógica de Geração do PIX (BRCode) ---

        function formatField(id, value) {
            const length = value.length.toString().padStart(2, '0');
            return `${id}${length}${value}`;
        }
        
        function normalizeText(text) {
            return text.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().replace(/[^A-Z0-9 ]/g, '').trim();
        }
        
        function formatKeyForBRCode(key, keyType) {
            const k = key.trim();
            switch (keyType) {
                case 'cpf':
                case 'cnpj':
                    return k.replace(/[^0-9]/g, ''); // Apenas números
                case 'celular':
                    let phone = k.replace(/[^0-9+]/g, ''); // Apenas números e '+'
                    if (phone.startsWith('+')) {
                        return phone; // Já está em E.164
                    }
                    // Se não tiver '+', assume +55 (Brasil)
                    return '+55' + phone.replace(/^(55)/, ''); 
                case 'email':
                case 'aleatoria':
                default:
                    return k; // Usa a chave como está
            }
        }

        function calculateCRC16(data) {
            let crc = 0xFFFF;
            for (let i = 0; i < data.length; i++) {
                let x = (crc >> 8) ^ data.charCodeAt(i);
                x ^= x >> 4;
                crc = (crc << 8) ^ (x << 12) ^ (x << 5) ^ x;
                crc &= 0xFFFF;
            }
            return crc.toString(16).toUpperCase().padStart(4, '0');
        }
        
        function generateBRCode(key, amount, merchantName, merchantCity, txid) {
            // Normaliza os textos APENAS para o BRCode
            const finalName = normalizeText(merchantName).substring(0, 25);
            const finalCity = normalizeText(merchantCity).substring(0, 15);
        
            const formattedAmount = amount.toFixed(2).toString();
            const pfi = '000201';
            
            const mai = formatField('00', 'BR.GOV.BCB.PIX') + formatField('01', key);
            
            const mcc = '52040000';
            const tc = '5303986';
            const ta = formatField('54', formattedAmount);
            const cc = '5802BR';
            const mn = formatField('59', finalName);
            const mc = formatField('60', finalCity);
            const ad = formatField('05', txid || '***'); 
            const adf = formatField('62', ad);
            
            let payload = [pfi, formatField('26', mai), mcc, tc, ta, cc, mn, mc, adf].join('');
            
            payload += '6304';
            const crc = calculateCRC16(payload);
            return payload + crc;
        }

        // --- Geração e Modal ---

        function parseValue(formattedValue) {
            let numericStr = formattedValue.replace('R$', '').replace(/\./g, '').replace(',', '.').trim();
            return parseFloat(numericStr) || 0;
        }
        
        function showResultModal(brcode, value) {
            try {
                if (modalPixValue && value) {
                    modalPixValue.textContent = value;
                }
                
                modalBrcodeTextarea.value = brcode;
                modalQrcodeContainer.innerHTML = ''; 
                
                QRCode.toCanvas(brcode, { 
                    errorCorrectionLevel: 'M',
                    width: 220, 
                    margin: 2
                }, (err, canvas) => {
                    if (err) throw err;
                    canvas.classList.add('rounded-lg');
                    modalQrcodeContainer.appendChild(canvas);
                    resultModal.classList.remove('hidden');
                });
            } catch (error) {
                console.error("Erro ao gerar QR Code para o modal:", error);
                errorGerar.textContent = 'Ocorreu um erro ao visualizar o Pix.';
                errorGerar.classList.remove('hidden');
            }
        }

        // MODIFICADO: generateBtn click (salva 'key' e 'bank' no histórico)
        generateBtn.addEventListener('click', () => {
            const receiverId = selectedReceiverId;
            const formattedValue = pixValueInput.value;
            
            errorGerar.classList.add('hidden');
            
            const receiver = receivers.find(r => r.id === receiverId);
            const value = parseValue(formattedValue);

            if (!receiver) {
                errorGerar.textContent = 'Por favor, selecione uma chave válida.';
                errorGerar.classList.remove('hidden');
                return;
            }
            if (value <= 0) {
                errorGerar.textContent = 'Por favor, insira um valor válido.';
                errorGerar.classList.remove('hidden');
                return;
            }

            const finalKey = formatKeyForBRCode(receiver.key, receiver.keyType);
            const finalName = receiver.name;
            const finalCity = receiver.city;
            const txid = "***"; 

            try {
                const brcode = generateBRCode(finalKey, value, finalName, finalCity, txid);
                
                history.push({
                    id: crypto.randomUUID(),
                    receiverName: receiver.name,
                    value: formattedValue,
                    date: new Date().toISOString(),
                    brcode: brcode,
                    receiverKey: receiver.key, // NOVO
                    receiverBank: receiver.bank || '' // NOVO
                });
                saveHistory();

                showResultModal(brcode, formattedValue); 
                pixValueInput.value = ""; 

            } catch (error) {
                console.error("Erro na geração do Pix:", error);
                errorGerar.textContent = 'Ocorreu um erro. Verifique os dados da chave.';
                errorGerar.classList.remove('hidden');
            }
        });
        
        // --- Eventos do Modal de Resultado ---
        closeModalBtn.addEventListener('click', () => {
            resultModal.classList.add('hidden');
            modalCopyFeedback.classList.add('hidden');
            modalCopyBtn.textContent = 'Copiar';
        });

        modalCopyBtn.addEventListener('click', () => {
            modalBrcodeTextarea.select();
            try {
                document.execCommand('copy');
                modalCopyFeedback.classList.remove('hidden');
                modalCopyBtn.textContent = 'Copiado!';
                setTimeout(() => {
                    modalCopyFeedback.classList.add('hidden');
                    modalCopyBtn.textContent = 'Copiar';
                }, 2000);

            } catch (err) {
                console.error('Falha ao copiar:', err);
                modalCopyFeedback.textContent = 'Falha ao copiar!';
                modalCopyFeedback.classList.remove('hidden', 'text-green-600');
                modalCopyFeedback.classList.add('text-red-600');
                 setTimeout(() => {
                    modalCopyFeedback.classList.add('hidden');
                    modalCopyFeedback.textContent = 'Copiado com sucesso!';
                    modalCopyFeedback.classList.remove('text-red-600');
                    modalCopyFeedback.classList.add('text-green-600');
                }, 2000);
            }
        });

        // Funções de controle do novo dropdown
        const chevronUpSVG = `<path fill-rule="evenodd" d="M14.78 11.78a.75.75 0 01-1.06 0L10 8.06l-3.72 3.72a.75.75 0 11-1.06-1.06l4.25-4.25a.75.75 0 011.06 0l4.25 4.25a.75.75 0 010 1.06z" clip-rule="evenodd" />`;
        const chevronDownSVG = `<path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 011.06 0L10 11.94l3.72-3.72a.75.75 0 111.06 1.06l-4.25 4.25a.75.75 0 01-1.06 0L5.22 9.28a.75.75 0 010-1.06z" clip-rule="evenodd" />`;

        function openReceiverSelect() {
            receiverSelectList.classList.remove('hidden');
            receiverSelectButton.setAttribute('aria-expanded', 'true');
            receiverSelectChevron.innerHTML = chevronUpSVG;
        }

        function closeReceiverSelect() {
            receiverSelectList.classList.add('hidden');
            receiverSelectButton.setAttribute('aria-expanded', 'false');
            receiverSelectChevron.innerHTML = chevronDownSVG;
        }

        function toggleReceiverSelect() {
            if (receiverSelectList.classList.contains('hidden')) {
                openReceiverSelect();
            } else {
                closeReceiverSelect();
            }
        }
        
        // --- Inicialização ---
        function init() {
            navButtons.gerar.addEventListener('click', () => showPage('gerar'));
            navButtons.recebedores.addEventListener('click', () => showPage('recebedores'));
            navButtons.historico.addEventListener('click', () => showPage('historico'));

            receiverSelectButton.addEventListener('click', (e) => {
                e.stopPropagation(); 
                toggleReceiverSelect();
            });

            receiverSelectList.addEventListener('click', (e) => {
                const option = e.target.closest('.receiver-select-option');
                if (option && option.dataset.id) {
                    selectedReceiverId = option.dataset.id;
                    updateReceiverSelectDisplay(); 
                    closeReceiverSelect(); 
                }
            });

            document.addEventListener('click', (e) => {
                if (!receiverSelectList.classList.contains('hidden') && !receiverSelectContainer.contains(e.target)) {
                    closeReceiverSelect();
                }
            });

            loadData();
            renderAll();
            showPage('gerar'); 
            resetReceiverForm(); 
        }

        window.onload = init;

    </script>
